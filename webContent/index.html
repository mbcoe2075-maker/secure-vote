<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVote - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    animation:float 8s infinite ease-in-out;
}

.circle:nth-child(1){
    width:250px;
    height:250px;
    left:-80px;
    top:-50px;
}

.circle:nth-child(2){
    width:180px;
    height:180px;
    right:50px;
    top:80px;
}

.circle:nth-child(3){
    width:300px;
    height:300px;
    bottom:-120px;
    right:-100px;
}

@keyframes float{
    50%{
        transform:translateY(-20px);
    }
}

.container{
    position:relative;
    z-index:2;
}

.login-box{
    width:380px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    padding:40px;
    color:#fff;
    box-shadow:0 20px 45px rgba(0,0,0,.3);
}

.logo{
    font-size:42px;
    text-align:center;
    margin-bottom:8px;
}

h1{
    text-align:center;
    font-size:30px;
}

.subtitle{
    text-align:center;
    font-size:14px;
    color:#dbeafe;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
}

.input-group input::placeholder{
    color:#dbeafe;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:22px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#059669;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    text-align:center;
    font-size:13px;
    color:#dbeafe;
}

.footer span{
    color:#fff;
    font-weight:600;
}

.security{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    color:#bbf7d0;
}

@media(max-width:450px){
    .login-box{
        width:90%;
        padding:30px;
    }
}
</style>

</head>
<body>

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="container">

<div class="login-box">

<div class="logo">🗳️</div>

<h1>SecureVote</h1>

<p class="subtitle">
Secure Online Voting System Prototype
</p>

<form id="loginForm">

<div class="input-group">
<label>Email Address</label>
<input
type="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
placeholder="Enter your password"
required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">
Login Securely
</button>

</form>

<div class="security">
🔒 Your login is protected with secure encryption.
</div>

<div class="footer">
Prototype Version • <span>SecureVote v1.0</span>
</div>

</div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    alert("Login successful! (Prototype Demo)");
});
</script>

</body>
</html>
